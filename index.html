<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>なんでモテん診断</title>

<style>
/* --- 基本レイアウト --- */
body{
margin:0;
font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
  background: linear-gradient(135deg, #ffd6ec, #d6f0ff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #333;
}

.container{
background:#fff;
padding:40px;
border-radius:25px;
width:90%;
max-width:600px;
text-align:center;
box-shadow:0 10px 30px rgba(171, 171, 171, 0.292);
max-height:90vh;
overflow-y:auto;
transform: scale(1);
animation: popIn 0.6s ease;
}

/* 進捗バーの見た目 */
.progress-container {
  width: 100%;
  height: 8px;
  background-color: #eee;
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff9ad5, #9ad7ff);
  transition: width 0.4s ease;
}

@keyframes popIn{
0%{transform:scale(0.9);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

/* --- テキスト装飾 --- */
.title{
  font-size:28px;
  background:linear-gradient(90deg,#ff6b9a,#6bbcff);
  background-clip:text;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-weight:bold;
  margin-bottom:10px;
}

.subtitle{ font-size:14px; color:#888; margin-bottom:20px; }

/* --- 質問文（診断中）の設定 --- */
#question {
  font-size: 20px;      /* 少し小さく */
  color: #333333;          /* 文字を薄いグレーに */
  font-weight: bold;  /* 文字を細く */
  margin-bottom: 20px;
  line-height: 1.6;
}

/* --- 選択肢ボタンの設定 --- */
#choices button {
    padding:15px;
    margin:10px;
    width:90%;
    border:none;
    font-weight: normal;
    border-radius:20px;
    background:#f5e8ff;
    cursor:pointer;
    transition:0.3s;
}


/* 選択肢にマウスを乗せたとき */
#choices button:hover {
  background: #f5e8ff;
  border-color: #ddd;
}

#typeName {
  font-weight: bold;
  background: linear-gradient(90deg,#ff6b9a,#6bbcff);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 10px auto;
  animation: pop 0.6s ease;
  display: block;
  width: 100%;
  overflow: hidden; /* 横揺れを強制ストップ */
  text-align: center;
}

/* 日本語名（王者ライオンタイプなど）の調整 */
.type-jp {
  display: block;
  font-size: clamp(20px, 7vw, 36px); /* 画面幅に合わせて自動縮小 */
  white-space: nowrap;
  margin-bottom: 5px;
}

/* 英語名（ACRなど）の調整 */
.type-en {
  display: block;
  font-size: 24px;
  -webkit-text-fill-color: #555;
  opacity: 0.7;
  letter-spacing: 2px;
}

/* 親要素（container）に基準を設定 */
.container {
  container-type: inline-size;
}

@keyframes pop{
0%{transform:scale(0.7);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

/* --- 入力欄 & ボタン --- */
.nameInput {
  padding: 15px;
  width: 80%;
  border-radius: 15px;
  border: 2px solid #eee;
  font-size: 18px;
  outline: none;
  text-align: center;
  transition: 0.3s;
}

.error-shake { animation: shake 0.3s; border-color: #ff6b6b; background: #fff0f0; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* --- ボタンのデザイン統一 --- */
button {
  padding: 12px;
  margin: 8px 5%;
  width: 90%;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
  font-weight: bold;
  font-family: inherit;
}

/* スタートボタン ＆ もう一度やるボタン（共通デザイン） */
.startBtn, .retryBtn {
  background: linear-gradient(90deg,#ff9ad5,#9ad7ff) !important;
  color: #fff !important;
  font-size: 18px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.15);
  padding: 16px;
  display: block;
  margin: 15px auto;
}

/* シェアボタン（おとなしめ） */
.shareBtn {
  background: #f0f0f0;
  color: #777;
  font-size: 14px;
  box-shadow: none;
  margin-top: 20px;
  padding: 10px;
}

button:hover {
  opacity: 0.9;
  transform: translateY(-2px);
}

button:active {
  transform: scale(0.95);
}

/* --- グラフ (MBTI風) --- */
.barBox { margin: 25px 0; text-align: left; animation: fadeUp 0.8s ease forwards; opacity: 0; }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(20px); } }

.barLabel {
  display: flex;
  justify-content: flex-start;
  align-items: baseline;
  gap: 10px;
  font-weight: bold;
  margin-bottom: 8px;
}

.barLabel .categoryName { color: #555; font-size: 16px; }
.barLabel .resultScore { font-size: 18px; }

.bar2 {
  position: relative;
  height: 24px;
  background: #eee;
  border-radius: 12px;
  overflow: hidden;
}

.colorFill {
  position: absolute;
  top: 0;
  height: 100%;
  transition: 1.2s cubic-bezier(.34,1.56,.64,1);
}
.colorFill.left { left: 0; }
.colorFill.right { right: 0; }

.indicator {
  position: absolute;
  top: 50%;
  width: 18px;
  height: 18px;
  background: #fff;
  border: 4px solid #ccc;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: 1.2s cubic-bezier(.34,1.56,.64,1);
  z-index: 10;
}

.axisLabels {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #999;
  margin-top: 5px;
  font-weight: bold;
}

/* --- 結果詳細セクション --- */
.section {
text-align: left;
margin-top: 15px;
padding: 15px;
border-radius: 15px;
background: #fff;
box-shadow: 0 5px 15px rgba(0,0,0,0.08);
opacity: 0;
animation: fadeUp 0.6s ease forwards;
}
.section b {
display: inline-block;
font-size: 14px;
margin-bottom: 8px;
padding: 4px 12px;
border-radius: 20px;
background: linear-gradient(90deg,#ff9ad5,#9ad7ff);
color: #fff;
}
.section p { white-space: pre-line; line-height: 1.6; margin: 0; font-size: 14px; color: #444;}

.hidden{ display: none; }
/* --- 画像をさらにインパクトのあるサイズに修正 --- */
img { 
  width: 450px; /* さらにサイズアップ */
  max-width: 98%; /* 画面端ギリギリまで */
  height: auto;
  margin: 15px 0; 
  border-radius: 25px; 
  box-shadow: 0 12px 30px rgba(0,0,0,0.15); 
}

.enqueteLink {
  display: block;
  margin-top: 25px;
  padding: 10px;
  color: #676666;
  font-size: 18px;
  text-decoration: underline;
  transition: 0.3s;
}

.enqueteLink:hover {
  color: #ff6b9a; /* ホバーした時にピンク色に */
}

/* スマホ向けの調整 */
@media (max-width: 600px) {
  body {
    /* 上詰めをやめて、上下中央に配置されるように戻す */
    align-items: center; 
    padding: 10px 0;
    /* スマホで高さが足りない場合に備えて最小高さを設定 */
    height: auto;
    min-height: 100vh;
  }
  .container {
    padding: 30px 20px; /* 左右にしっかり余白を作る */
    width: 85%;         /* 画面の端から少し離す */
    max-width: 320px;   /* 小さなスマホでもはみ出ないように */
    margin: 20px auto;  /* 上下に少し隙間を作る */
  }
  .title {
    font-size: 20px;
  }
  #typeName {
    font-size: 6.5cqw; /* スマホの時は少しだけ大きく調整 */
    letter-spacing: -1px; /* 文字の間隔をわずかに詰めて収まりやすくする */
  }
  #question {
    font-size: 18px;
  }
  img {
    width: 100%;
    margin: 10px 0;
  }
  .section p {
    font-size: 15px;
  }
}


</style>
</head>

<body>
<div class="container" id="app">

  <div id="start">
    <h1 class="title">彼氏ができない原因診断</h1>
    <p class="subtitle">あなたの恋愛タイプを可視化💖</p>
    <input id="name" placeholder="名前を入力" class="nameInput"><br><br>
    <button class="startBtn" onclick="startTest()">診断をはじめる</button>
  </div>

  <div id="quiz" class="hidden">
    <div class="progress-container">
      <div id="progressBar" class="progress-fill"></div>
    </div>
    <div id="progressText" style="font-size: 12px; color: #888; margin-bottom: 10px; text-align: right;"></div>
    <h2 id="question"></h2>
    <div id="choices"></div>
  </div>

  <div id="result" class="hidden">
    <p id="resultTitle" style="color:#888; margin-bottom:0;"></p>
    <h1 id="typeName"></h1><br>
    <img id="resultImage">

    <div id="graph"></div>

    <div class="section" style="animation-delay:0.2s;"><b>このタイプは…</b><p id="desc"></p></div>
    <div class="section" style="animation-delay:0.4s;"><b>あなたの魅力</b><p id="good"></p></div>
    <div class="section" style="animation-delay:0.6s;"><b>あなたの弱点</b><p id="bad"></p></div>
    <div class="section" style="animation-delay:0.8s;"><b>アドバイス</b><p id="advice"></p></div>

<a href="https://forms.gle/jbtjXMtidgLBtDqs5" target="_blank" class="enqueteLink">
  📋 みんなの結果集計中！アンケートにご協力ください 💖
</a>

   <br>
    <button class="shareBtn" onclick="copyResult()">✨結果をコピーしてシェアする</button>
    <button class="retryBtn" onclick="location.reload()">もう一度診断する</button>


  </div>

</div>

<script>
let name="", index=0;
let A=0, C=0, R=0;
let currentType = "";

const questions=[
{q:"気になる人ができたときどうする？",axis:"A",a:[["自分から話しかける・アピールする",5],["様子をうかがい、タイミングがあれば話す",3],["話したいけど何もできない",-3],["何も行動せずただ相手が来るのを待つ",-5]]},
{q:"普段の異性とのかかわり方は？",axis:"A",a:[["自分から話しかけることが多い",5],["話しかけられたら話す",3],["業務連絡だけ",-3],["自分の家族としか話さないレベル",-5]]},
{q:"相手との予定を決めるときは？",axis:"A",a:[["自分から日程や内容を提案する",5],["お互いに案を出し合って決めたい",3],["相手がしたいことをしたい",-3],["相手に全部決めてもらいたい",-5]]},
{q:"好きな人と話すチャンスがあったら？",axis:"A",a:[["絶対逃さず自分から話す",5],["勇気を出して話しかけてみる",3],["話せるのに見送ることが多い",-3],["絶対無理。話しかけれない",-5]]},
{q:"好きな人の情報を知りたいときは？",axis:"A",a:[["直接聞いたり行動で知ろうとする",5],["友達の手も借りながら、自分から知ろうとする",3],["知りたい情報は友達を通して知る",-3],["知りたいなーで終わってしまう事が多い",-5]]},

{q:"自分は恋愛対象としてどう思う？",axis:"C",a:[["魅力的だと思う",5],["普通かな",3],["自信がないなあ",-3],["絶対無理",-5]]},
{q:"自分の見た目や性格に、ある程度満足していますか？",axis:"C",a:[["満足してる",5],["普通かな",3],["できてない",-3],["死んで来世に期待するレベル",-5]]},
{q:"他の人と比べたときの気持ちは？",axis:"C",a:[["自分の方がいいなって思えることがほとんど",5],["まあ自分の方がいいって思うことが多いかな",3],["自分は劣っていると感じる",-3],["毎日比べすぎてしんどくなってくる",-5]]},
{q:"相手が自分に優しくしてくれた時、どう感じる？",axis:"C",a:[["「相手も私の事好きなんじゃない！」ポジティブに考える",5],["「もしかして脈あり？」期待でどきどき",3],["「誰にでも優しいだけ...」と受け流す",-3],["「絶対違うんだよな...」とネガティブ思考",-5]]},
{q:"誰かに褒められたときは？",axis:"C",a:[["当たり前だろ！！",5],["素直に受け取る",3],["お世辞かもと思ってしまう",-3],["この人は嘘をついていると思ってしまう自分に嫌気がさす",-5]]},

{q:"学校生活の中で、異性のクラスメイトと話す機会がある？",axis:"R",a:[["気軽に話せる関係",5],["１日１回くらいは話す",3],["用事があるときぐらいしか話さない",-3],["全く話さないor周りに異性がいない",-5]]},
{q:"新しく異性と知り合う機会がある？（学校・部活・遊びなど）",axis:"R",a:[["自分から新しい機会に行く",5],["きっかけがあれば ",3],["ほとんどない",-3],["まじでなんもない",-5]]},
{q:"勉強や部活の忙しさをパーセントで表すと？",axis:"R",a:[["９０%",-5],["７０%",-3],["４０%",3],["１０% ",5]]},
{q:"あなたの学校はどっち？",axis:"R",a:[["共学",5],["女子校",-5]]},
{q:"あなたが普段過ごしているコミュニティーに男子はいる？",axis:"R",a:[["いる！",5],["いない！",-5]]}
];


// 最大スコアの計算
let totalA_max=25, totalC_max=25, totalR_max=25;

function startTest() {
  const input = document.getElementById("name");
  name = input.value.trim();
  if (name === "") {
    input.classList.add("error-shake");
    setTimeout(() => input.classList.remove("error-shake"), 300);
    return;
  }
  document.getElementById("start").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQ();
}

function showQ(){
  let q = questions[index];
  
  // 進捗率を計算してバーと数字を更新
  const progressPercent = ((index + 1) / questions.length) * 100;
  document.getElementById("progressBar").style.width = progressPercent + "%";
  document.getElementById("progressText").innerText = (index + 1) + " / " + questions.length;

  document.getElementById("question").innerText = q.q;
  let html = "";
  q.a.forEach(choice => {
    html += `<button onclick="answer(${choice[1]})">${choice[0]}</button>`;
  });
  document.getElementById("choices").innerHTML = html;
}

function answer(score){
  let axis=questions[index].axis;
  if(axis==="A") A+=score;
  if(axis==="C") C+=score;
  if(axis==="R") R+=score;
  index++;
  index<questions.length?showQ():showResult();
}

function toPercent(score, max) {
  return Math.round(((score + max) / (max * 2)) * 100);
}

// グラフ用HTML生成関数
function createBarHTML(category, labelL, labelR, value, colorL, colorR) {
  const activeTypeName = (value >= 50) ? labelL : labelR;
  const activeColor = (value >= 50) ? colorL : colorR;
  const displayPercent = (value >= 50) ? value : (100 - value);

  return `
  <div class="barBox">
    <div class="barLabel">
      <span class="categoryName">${category}：</span>
      <span class="resultScore" style="color:${activeColor}">${displayPercent}% ${activeTypeName}</span>
    </div>
    <div class="bar2">
      <div class="colorFill left" style="background:${colorL}; width:${value}%"></div>
      <div class="colorFill right" style="background:${colorR}; width:${100 - value}%"></div>
      <div class="indicator" style="border-color:${activeColor}; left:${value}%"></div>
    </div>
    <div class="axisLabels">
      <span>${labelL}</span>
      <span>${labelR}</span>
    </div>
  </div>`;
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  const judge = (x,pos,neg) => x >= 0 ? pos : neg;
  currentType = judge(A,"A","P") + judge(C,"C","I") + judge(R,"R","L");

  // 日本語名称のリスト
  const typeNamesJP = {
    ACR: "王者ライオンタイプ",
    ACL: "眠れる白鳥タイプ",
    AIR: "くるくる全力ハムスタータイプ",
    AIL: "負けパンダタイプ",
    PCR: "余裕かまし猫タイプ",
    PCL: "高嶺のシカタイプ",
    PIR: "残念ウサギタイプ",
    PIL: "マイペース亀タイプ"
  };

  document.getElementById("resultTitle").innerText = name + "さんの結果は…";

  document.getElementById("typeName").innerHTML = `
    <span class="type-jp">${typeNamesJP[currentType]}</span>
    <span class="type-en">${currentType}</span>
  `;

  // 画像設定
  const images = {
    ACR: "IMG_4315 3.jpg",
    ACL: "IMG_4318 3.jpg",
    AIR: "IMG_4319 3.jpg",
    AIL: "IMG_4342.jpg",
    PCR: "IMG_4341.jpg",
    PCL: "IMG_4339.jpg",
    PIR: "IMG_4340.jpg",
    PIL: "IMG_4344.jpg"
  };
  document.getElementById("resultImage").src = images[currentType] || images["ACR"];

  const texts = {
   ACR:{
desc:"このタイプは、恋愛において必要とされる要素の「積極性」「自己肯定感」「環境」がすべてそろっている、めちゃくちゃ有利な立場にいるタイプ🦁",
good:"積極性の面では、自分から人に話しかけたり距離を縮めたりすることに対して強い抵抗がなく、気になる相手がいれば自然な流れで関係を深めていくことができます。そのため、恋愛のスタートラインに立つこと自体が他のタイプより難しくなく、<span style='color:#ff6b9a; font-weight:bold;'>チャンスを自分で作り出せる力</span>を持っています！\nさらに自己肯定感も高いので、「自分なんかが好かれるわけない」のようなネガティブな思い込みに縛られにくく、相手の人と対等な関係を築こうとする姿勢を持っているのも特徴です。これによって相手に対してものすごく依存したり、自分を下げすぎたりすることが少なく、安定したコミュニケーションが取りやすい状態になっています。\nまた環境面でも人との関わりが多かったり、友人関係が広かったりと、出会いの機会に恵まれていることが多く、恋愛に発展するチャンスが日常の中に存在していることが多いです。このように三つの要素がそろっているため、周囲からは「モテそう」「恋愛で困らなそう」と思われやすく、実際にあと一歩で関係が進展する場面もあるでしょう。",
bad:"強みがそろっているがゆえに、自分のペースで関係を進めすぎてしまうという部分もあります。自分にとっては自然な距離の詰め方でも、相手にとっては早すぎたり、気持ちが追いつかなかったりして、<span style='color:#ff6b9a; font-weight:bold;'>無意識のうちに温度差が生まれてしまうことも…。</span>また、選択肢が多い環境にいるから、一人の相手だけに集中しきれず、「もっと合う人がいるんじゃないかなぁ」と考えてしまい、関係が深まる前に止まってしまうケースもあります。\nつまりこのタイプは、能力が不足しているのではなく、むしろ条件が整いすぎていることによってバランスを崩しやすいタイプ！ほんの少しの調整によって恋愛の成功率が大きく変わる可能性を持っています。強みを活かし、相手のペースや感情に目を向けることができれば、かなり安定した関係を築くことができるタイプです。",
advice:"このタイプに必要なのは「頑張ること」じゃなくて、<span style='color:#ff6b9a; font-weight:bold;'>アプローチをコントロールすること</span>です。自分のテンポ＝相手のテンポじゃないということを意識する。自分が100%で関係を進めたいときでも、相手はまだ40%くらいのときもあります。\n具体的には\n・好意は最初から全部出さずに、ちょっと抑える \n・相手の返信速度やテンションに合わせる\n・会話で「聞く側」に少し寄る\nこれを意識してみるだけでかなりいい印象が変わること間違いなし！\nもう一つ大事なのは、「選べる立場」だからこそ雑にしないことです。選択肢が多いと無意識に一人一人への向き合い方が浅くなりやすい。でも、ちゃんと一人に向き合えたときこのタイプは輝くことができます。つまり、あなたは「できることを減らす」ことが成長になるタイプ。ここをちょっと抑えるだけで一気に安定してモテる側に入ります！"
},
ACL:{
